# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Clean old build artifacts
        run: |
          rm -rf dist build *.egg-info

      - name: Build release distributions
        run: |
          # NOTE: put your own distribution build steps here.
          python -m pip install --upgrade pip
          python -m pip install build

          # Force the version to match the release tag (vX.Y.Z -> X.Y.Z)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: ${VERSION} (from tag ${GITHUB_REF_NAME})"
          SETUPTOOLS_SCM_PRETEND_VERSION="${VERSION}" python -m build

      - name: Assert exactly one version built (safety check)
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          versions = set()
          for p in Path('dist').iterdir():
            name = p.name
            if not name.startswith('guess_the_duck-'):
              continue

            # Match wheel and sdist filenames and capture the version only.
            m = re.match(r"^guess_the_duck-(?P<ver>.+?)(?:-py\d+-none-any\.whl|\.tar\.gz)$", name)
            if not m:
              raise SystemExit(f"Unrecognized dist filename: {name}")
            versions.add(m.group('ver'))

          if len(versions) != 1:
            raise SystemExit(f"Expected exactly 1 version in dist/, found: {sorted(versions)}")

          print("dist/ version:", next(iter(versions)))
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
